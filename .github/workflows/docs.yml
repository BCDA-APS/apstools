name: Publish Sphinx Docs to GitHub Pages

# Design:
#   - Every push to main auto-deploys to the "dev/" subdirectory on gh-pages.
#   - A manual workflow_dispatch with deploy=true publishes the most recent
#     git tag as a versioned subdirectory (e.g. "1.7.10/") on gh-pages.
#   - Old version subdirectories are preserved automatically because we use
#     destination_dir rather than force_orphan.
#   - The root index.html (redirect to dev/) is updated on every release deploy.
#   - switcher.json is generated by scripts/make_switcher.py and committed to
#     main as part of the release process (before triggering this workflow).

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy tagged release documentation"
        type: boolean
        required: true
        default: false

defaults:
  run:
    shell: bash -l {0}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    name: Build and publish documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get -y install pandoc

      - name: Install our package and Sphinx build requirements
        run: pip install -e .[doc]

      - name: Determine version to publish
        run: |
          if [ "${{ github.event.inputs.deploy }}" = "true" ]; then
            VERSION=$(git describe --tags --abbrev=0)
          else
            VERSION="dev"
          fi
          echo "VERSION=${VERSION}" >> ${GITHUB_ENV}
          echo "Publishing as: ${VERSION}"

      - name: Build Sphinx docs
        run: |
          TMP_DIR=$(mktemp -d)
          echo "TMP_DIR=${TMP_DIR}" >> ${GITHUB_ENV}
          TZ=UTC sphinx-build -M html ./docs/source "${TMP_DIR}/build"

      - name: Upload docs as artifact
        uses: actions/upload-artifact@v7
        with:
          name: apstools-docs-${{ env.VERSION }}
          path: ${{ env.TMP_DIR }}/build/html

      - name: Deploy dev/ on every push to main
        uses: peaceiris/actions-gh-pages@v4
        if: github.event_name == 'push'
        with:
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ env.TMP_DIR }}/build/html
          destination_dir: dev
          keep_files: true

      - name: Deploy tagged release on manual trigger
        uses: peaceiris/actions-gh-pages@v4
        if: ${{ github.event.inputs.deploy == 'true' }}
        with:
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ env.TMP_DIR }}/build/html
          destination_dir: ${{ env.VERSION }}
          keep_files: true

      - name: Update root index.html on release deploy
        uses: peaceiris/actions-gh-pages@v4
        if: ${{ github.event.inputs.deploy == 'true' }}
        with:
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .github/pages
          destination_dir: .
          keep_files: true
